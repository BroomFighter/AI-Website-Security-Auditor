<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Website Auditor</title>
    <!-- Simple styling using Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                
                <!-- Logo / Header -->
                <div class="mb-4">
                    <h1 class="fw-bold text-primary">🛡️ AI Security Auditor</h1>
                    <p class="text-muted">Analyze website security configurations and headers</p>
                </div>

                <!-- Input Form -->
                <div class="card shadow-sm p-4">
                    <form action="/scan" method="POST">
                        <div class="mb-3">
                            <label for="url" class="form-label fw-semibold">Enter Website URL</label>
                            <input 
                                type="url" 
                                class="form-control form-control-lg" 
                                id="url" 
                                name="url" 
                                placeholder="https://example.com" 
                                required
                            >
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Scan Website</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
